name: Release Build

# 触发策略：仅在推送 v* 格式的 Tag 时构建，避免每次提交浪费资源
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "手动指定 Release 版本号 (如 v0.9.0)"
        required: false

permissions:
  contents: write

env:
  # 前端构建输出目录（Tauri 构建前需先编译前端）
  FRONTEND_DIST: frontend/dist

jobs:
  # ═══════════════════════════════════════════════════════════════
  # macOS 构建 (Apple Silicon + Intel 通用二进制)
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            arch_label: arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            arch_label: x64

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: |
          npm install
          cd frontend && npm install

      - name: 构建前端
        run: cd frontend && npm run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 构建 Tauri 应用
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch_label }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 3

  # ═══════════════════════════════════════════════════════════════
  # Linux 构建 (x86_64)
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Tauri 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: |
          npm install
          cd frontend && npm install

      - name: 构建前端
        run: cd frontend && npm run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 构建 Tauri 应用
        run: cargo tauri build
        working-directory: src-tauri

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          retention-days: 3

  # ═══════════════════════════════════════════════════════════════
  # Windows 构建 (x86_64)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        run: |
          npm install
          cd frontend && npm install

      - name: 构建前端
        run: cd frontend && npm run build

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 构建 Tauri 应用
        run: cargo tauri build
        working-directory: src-tauri

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 3

  # ═══════════════════════════════════════════════════════════════
  # 发布：收集所有平台产物并创建 GitHub Release
  # ═══════════════════════════════════════════════════════════════
  publish-release:
    name: Publish Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 查看产物清单
        run: find artifacts -type f | sort

      - name: 确定版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: 创建 GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: "VeilBrowser ${{ steps.version.outputs.tag }}"
          artifacts: "artifacts/**/*"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          generateReleaseNotes: true
          body: |
            ## VeilBrowser ${{ steps.version.outputs.tag }}

            ### 安装包

            | 平台 | 文件类型 |
            |------|---------|
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux | `.deb` / `.AppImage` |
            | Windows | `.msi` / `.exe` |

            ---
            > 由 GitHub Actions 自动构建
