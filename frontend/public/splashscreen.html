<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeilBrowser Starting</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #020617; /* Tailwind slate-950 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f8fafc;
            user-select: none;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }

        /* Abstract Veil Logo CSS */
        .veil-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
            filter: drop-shadow(0 0 15px rgba(114, 46, 209, 0.5));
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fade-in 0.8s ease-out;
        }

        .subtitle {
            margin-top: 8px;
            font-size: 13px;
            color: #64748b; /* slate-500 */
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            animation: fade-in 1.2s ease-out;
        }

        .loading-bar-container {
            margin-top: 40px;
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: #a855f7; /* purple-500 */
            border-radius: 2px;
            animation: slide 1.5s ease-in-out infinite alternate;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; box-shadow: 0 0 20px rgba(114, 46, 209, 0.3); }
            50% { opacity: 0.8; box-shadow: 0 0 40px rgba(114, 46, 209, 0.6); }
        }

        @keyframes slide {
            0% { left: -30%; }
            100% { left: 100%; }
        }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo-vibrant.png" class="veil-logo" alt="Logo" />
    </div>
    <h1 class="title">VeilBrowser</h1>
    <div class="subtitle">Agent OS Initializing</div>
    
    <div class="loading-bar-container">
        <div class="loading-bar"></div>
    </div>
</body>
</html>
